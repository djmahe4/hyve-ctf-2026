{% extends "admin/challenges/update.html" %}

{% block value %}
<div class="form-group">
    <label for="value">Current Value<br>
        <small class="form-text text-muted">
            This value decreases over time.
        </small>
    </label>
    <input type="number" class="form-control" name="value" placeholder="Enter value" id="value-input" required>
</div>

<div class="form-group">
    <label for="value">Decay Limit<br>
        <small class="form-text text-muted">The minimum points this challenge can decrease to</small>
    </label>
    <input type="number" class="form-control" name="minimum" placeholder="Enter minimum value" id="minimum-input"
        required>
</div>

<div class="form-group">
    <label for="value">Decay Rate<br>
        <small class="form-text text-muted">Points deducted per decay period</small>
    </label>
    <input type="number" class="form-control" name="decay" placeholder="Enter decay rate" id="decay-input" required>
</div>
{% endblock %}
