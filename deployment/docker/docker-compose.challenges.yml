version: '3.8'

services:
  challenge-web:
    build:
      context: ../../
      dockerfile: challenges/web/Dockerfile
    container_name: ctf-web-challenges
    ports:
      - "8080:8080"
    environment:
      - FLAG_SQL_INJECTION=FLAG{sql_1nj3ct10n_b4s1c}
      - FLAG_COOKIE_MANIP=FLAG{c00k13_m4n1pul4t10n}
      - FLAG_XSS=FLAG{xss_r3fl3ct3d_vuln}
      - FLAG_IDOR=FLAG{1d0r_pr1v_3sc4l4t10n}
    restart: unless-stopped
    networks:
      - challenge_network

  challenge-files:
    image: nginx:alpine
    container_name: ctf-file-server
    ports:
      - "8081:80"
    volumes:
      - ../../challenges:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - challenge_network

  file-proxy:
    build:
      context: .
      dockerfile: Dockerfile.file-proxy
    container_name: ctf-file-proxy
    ports:
      - "8082:8082"
    volumes:
      - ../../challenges:/challenges:ro
    environment:
      - CTFD_URL=http://ctfd:8000
    restart: unless-stopped
    networks:
      - challenge_network
      - ctfd_network

networks:
  challenge_network:
    driver: bridge
  ctfd_network:
    external: true
    name: ctfd_network
