version: "1.0"

challenges:
  - name: "Bistro Location"
    category: OSINT
    description: |
      Our secret bistro location is hidden in this image. Can you find where we are located?
      
      <!-- HYVE_CTF{not_this_one} -->

      Flag format: HYVE_CTF{CITY_COUNTRY_LANDMARK}
      Example: HYVE_CTF{LONDON_UK_BIGBEN}
    value: 100
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{PARIS_FRANCE_EIFFELTOWER}"
        type: static
    files:
      - location: challenges/static/osint/mystery_location.jpg
    hints:
      - content: "EXIF data might reveal the coordinates."
        cost: 0

  - name: "Secret Highway"
    category: OSINT
    description: |
      This is a secret highway. Can you find where this is located?

      Flag format: HYVE_CTF{CITY_COUNTRY}
      Example: HYVE_CTF{LONDON_UK}
    value: 100
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{STOCKHOLM_SWEDEN}"
        type: static
    files:
      - location: challenges/static/osint/unknown_highway.png

  - name: "Mystery Place"
    category: OSINT
    description: |
      This is a secret location. Can you find where this is located?

      Flag format: HYVE_CTF{PLaCe}
    value: 100
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{CHiNa}"
        type: static
    files:
      - location: challenges/static/osint/mystery_place.jpg

  - name: "Secret Ingredient List"
    category: Steganography
    description: |
      A secret list of ingredients is hidden in this bistro cat photo. 
      
      Hint: The password is in the provided wordlist (which is now shorter for your convenience).
    value: 100
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{st3g0_cat_m4st3r}"
        type: static
    files:
      - location: challenges/static/stego/cat.jpeg
      - location: challenges/static/stego/wordlist.txt
    hints:
      - content: "Use steghide to extract the data."
        cost: 0

  - name: "Bistro Menu Cipher"
    category: Cryptography
    description: |
      We found a ciphered note on the back of a menu:
      SYNT{pnrfne_vf_gbb_jrnx}
      
      It appears to be using a classical shift cipher. Can you decrypt it?
      
    value: 150
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{caesar_is_too_weak}"
        type: static

  - name: "Staff Portal Bypass"
    category: Web
    description: |
      The Hyve Bistro staff portal has a vulnerability. Gain access to the internal dashboard.
      Target: http://distro.tkv.in.net/staff-login

      Retrieve the internal bypass token.
    value: 200
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{sql_1nj3ct10n_b4s1c}"
        type: static
    hints:
      - content: "Standard SQLi characters like ' might break the query."
        cost: 0

  - name: "Gold Membership"
    category: Web
    description: |
      Only 'Gold Members' can see special reward codes on their profile.
      Target: http://distro.tkv.in.net/profile
    value: 200
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{c00k13_m4n1pul4t10n}"
        type: static
    hints:
      - content: "Check your cookies. Can you change your role?"
        cost: 0

  - name: "Bistro Traffic Audit"
    category: Network
    description: |
      Analyze the bistro's internal traffic to find cleartext customer credentials.

      Flag format: HYVE_CTF{CREDENTIALS_HASH}
    value: 350
    type: standard
    state: visible
    max_attempts: 0
    hints:
      - content: "Use Wireshark to analyze the traffic."
        cost: 0
      - content: "Look out for HASH hidden in authentication requests."
        cost: 0
    flags:
      - flag: "HYVE_CTF{cl34rt3xt_cr3ds_f0und}"
        type: static
    files:
      - location: challenges/static/network/cleartext_traffic.pcap

  - name: "Chef's Secret Recipe"
    category: Cryptography
    description: |
      The Chef encoded his secret recipe using a multi-layered approach to keep it away from competitors.
      
      Encoded string: RlN5SkVJOVFJUk03TDJ1eU1hQXNwMkl3cHpJMEszVmpxUzl2QXdFc29KeTRzRD09
      
      *Hint: It's more than just one standard encoding. Don't let the first layer rotate your head.*
    value: 200
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{chefs_secret_r0t_b64_mix}"
        type: static
    files:
      - location: challenges/static/crypto/recipe.txt

  - name: "Menu Search Vulnerability"
    category: Web
    description: |
      The ingredients search bar is reflecting input. 
