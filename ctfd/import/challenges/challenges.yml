version: "1.0"

challenges:
  - name: "Bistro Location"
    category: OSINT
    description: |
      Our secret bistro location is hidden in this image. Can you find where we are located?
      
      <!-- HYVE_CTF{not_this_one} -->

      Flag format: HYVE_CTF{CITY_COUNTRY_LANDMARK}
      Example: HYVE_CTF{LONDON_UK_BIGBEN}
    value: 100
    type: standard
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{PARIS_FRANCE_EIFFELTOWER}"
        type: static
    files:
      - location: challenges/static/osint/mystery_location.jpg
    hints:
      - content: "EXIF data might reveal the coordinates."
        cost: 0

