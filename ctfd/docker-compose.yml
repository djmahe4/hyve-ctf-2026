version: '3.8'

services:
  ctfd:
    image: ctfd/ctfd:latest
    ports:
      - "8001:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd_password@db/ctfd
      - REDIS_URL=redis://cache:6379
      - SECRET_KEY=HivyeCTF2026SecretKeyForSessions
      - WORKERS=4
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
      - SECRET_FLAG_KEY=HivyeS3cretKey2026
    volumes:
      - ./data/CTFd/logs:/var/log/CTFd
      - ./data/CTFd/uploads:/var/uploads
      # Plugin mount disabled due to CTFd version compatibility
      - ./import/plugins:/opt/CTFd/CTFd/plugins:ro
      - ./import:/opt/CTFd/import:ro
    depends_on:
      - db
      - cache
    networks:
      - ctfd_network
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=ctfd_root_password
      - MYSQL_USER=ctfd
      - MYSQL_PASSWORD=ctfd_password
      - MYSQL_DATABASE=ctfd
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - ctfd_network
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    networks:
      - ctfd_network
    restart: unless-stopped

networks:
  ctfd_network:
    driver: bridge
    name: ctfd_network
