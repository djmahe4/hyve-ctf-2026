version: "1.0"

challenges:
  - name: "Bistro Location"
    category: OSINT
    description: |
      Our secret bistro location is hidden in this image. Can you find where we are located?
      
      <!-- HYVE_CTF{not_this_one} -->

      Flag format: HYVE_CTF{CITY_COUNTRY_LANDMARK}
      Example: HYVE_CTF{LONDON_UK_BIGBEN}

      Download the image from the Files tab or via the authenticated proxy:
      http://localhost:8082/files/osint/mystery_location.jpg
    value: 100
    type: dynamic
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{PARIS_FRANCE_EIFFELTOWER}"
        type: static
    files:
      - location: challenges/osint/mystery_location.jpg
    hints:
      - content: "EXIF data might reveal the coordinates."
        cost: 0

  - name: "Secret Ingredient List"
    category: Steganography
    description: |
      A secret list of ingredients is hidden in this bistro cat photo. 
      It was embedded using steghide.
      
      Hint: The password is in the provided wordlist (which is now shorter for your convenience).
      
      Download the files from the Files tab or via the authenticated proxy:
      - http://localhost:8082/files/stego/cat.jpeg
      - http://localhost:8082/files/stego/wordlist.txt
    value: 100
    type: dynamic
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{st3g0_cat_m4st3r}"
        type: static
    files:
      - location: challenges/stego/cat.jpeg
      - location: challenges/stego/wordlist.txt
    hints:
      - content: "Use steghide to extract the data."
        cost: 0

  - name: "Bistro Menu Cipher"
    category: Cryptography
    description: |
      We found a ciphered note on the back of a menu:
      SYNT{pnrfne_vf_gbb_jrnx}
      
      It appears to be using a classical shift cipher. Can you decrypt it?
      
      Hint: This cipher was used by Julius Caesar himself.
    value: 100
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{caesar_is_too_weak}"
        type: static

  - name: "Staff Portal Bypass"
    category: Web
    description: |
      The Hyve Bistro staff portal has a vulnerability. Gain access to the internal dashboard.
      Target: http://localhost:8080/staff-login

      Retrieve the internal bypass token.
    value: 200
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{sql_1nj3ct10n_b4s1c}"
        type: static
    hints:
      - content: "Standard SQLi characters like ' might break the query."
        cost: 0

  - name: "Gold Membership"
    category: Web
    description: |
      Only 'Gold Members' can see special reward codes on their profile.
      Target: http://localhost:8080/profile
    value: 200
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{c00k13_m4n1pul4t10n}"
        type: static
    hints:
      - content: "Check your cookies. Can you change your role?"
        cost: 0

  - name: "Bistro Traffic Audit"
    category: Network
    description: |
      Analyze the bistro's internal traffic to find cleartext customer credentials.
      
      **Note:** Download the PCAP file from the Files tab (authenticated) or via the proxy:
      http://localhost:8082/files/network/cleartext_traffic.pcap
    value: 200
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{cl34rt3xt_cr3ds_f0und}"
        type: static
    files:
      - location: challenges/network/cleartext_traffic.pcap

  - name: "Chef's Secret Recipe"
    category: Cryptography
    description: |
      The Chef encoded his secret recipe.
      Encoded string: VTBac1YxSldPVVJXUlZvM1dXMUdlbHBVV1RCWU1sSnNXVEk1YTFwWFVtWmpNMVpxV1RKV2VtTXpNRDBLCg==
    value: 200
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{base64_decoded_success}"
        type: static

  - name: "Menu Search Vulnerability"
    category: Web
    description: |
      The ingredients search bar is reflecting input. 
      Target: http://localhost:8080/menu-search?q=YOUR_INPUT

      Execute script to reveal the secret search token.
    value: 300
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{xss_r3fl3ct3d_vuln}"
        type: static

  - name: "Order Tracking Exploit"
    category: Web
    description: |
      Access other customers' orders via the tracking API.
      Target: http://localhost:8080/api/order/tracking/1

      View the note for order #1.
    value: 300
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{1d0r_pr1v_3sc4l4t10n}"
        type: static

  - name: "Ingredient Source Diver"
    category: Web
    description: |
      The most secret ingredient source is hidden in plain sight.
      Target: http://localhost:8080/secret-ingredients
    value: 100
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{html_embedded_flag}"
        type: static


