    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{1d0r_pr1v_3sc4l4t10n}"
        type: static

  - name: "Ingredient Source Diver"
    category: Web
    description: |
      The most secret ingredient source is hidden in plain sight.
      Target: http://distro.tkv.in.net/secret-ingredients
    value: 100
    type: standard
    state: visible
    max_attempts: 0
    flags:
