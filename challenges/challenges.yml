  - name: "Lord of Mischief"
    category: Misc
    description: |
      Who is the lord of mischief?
    value: 50
    type: standard
    state: hidden
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{LOKI}"
        type: static


