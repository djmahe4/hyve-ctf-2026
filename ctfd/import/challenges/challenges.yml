version: "1.0"

challenges:
  - name: "Bistro Location"
    category: OSINT
    description: |
      Our secret bistro location is hidden in this image. Can you find where we are located?
      
      <!-- HYVE_CTF{not_this_one}_FAKEHASH -->

      Flag format: HYVE_CTF{CITY_COUNTRY_LANDMARK_HASH}
      Example: HYVE_CTF{LONDON_UK_BIGBEN_HASH}

      Download the image from: http://challenges:8081/osint/mystery_location.jpg
    value: 100
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{PARIS_FRANCE_EIFFELTOWER_HASH}"
        type: dynamic_xor
    files:
      - location: /challenges/osint/mystery_location.jpg
    hints:
      - content: "EXIF data might reveal the coordinates."
        cost: 10

  - name: "Secret Ingredient List"
    category: Steganography
    description: |
      A secret list of ingredients is hidden in this bistro cat photo. 
      It was embedded using steghide.
      
      Hint: The password is in the provided wordlist (which is now shorter for your convenience).
      
      Download the image from: http://challenges:8081/stego/cat.jpeg
      Download the wordlist from: http://challenges:8081/stego/wordlist.txt
    value: 100
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{st3g0_cat_m4st3r_HASH}"
        type: dynamic_xor
    files:
      - location: /challenges/stego/cat.jpeg
      - location: /challenges/stego/wordlist.txt
    hints:
      - content: "The password is the year '2026' transposition-ciphered."
        cost: 20

  - name: "Bistro Menu Cipher"
    category: Cryptography
    description: |
      We found a ciphered note on the back of a menu:
      SYNT{pnrfne_vf_gbb_jrnx}

      It appears to be using a classical shift cipher. Can you decrypt it?

      Hint: This cipher was used by Julius Caesar himself.
    value: 100
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{caesar_is_too_weak_HASH}"
        type: dynamic_xor

  - name: "Staff Portal Bypass"
    category: Web
    description: |
      The Hyve Bistro staff portal has a vulnerability. Gain access to the internal dashboard.
      Target: http://challenges:8080/staff-login

      Retrieve the internal bypass token.
    value: 200
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{sql_1nj3ct10n_b4s1c_HASH}"
        type: dynamic_xor
    hints:
      - content: "Standard SQLi characters like ' might break the query."
        cost: 40

  - name: "Gold Membership"
    category: Web
    description: |
      Only 'Gold Members' can see special reward codes on their profile.
      Target: http://challenges:8080/profile
    value: 200
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{c00k13_m4n1pul4t10n_HASH}"
        type: dynamic_xor
    hints:
      - content: "Check your cookies. Can you change your role?"
        cost: 40

  - name: "Bistro Traffic Audit"
    category: Network
    description: |
      Analyze the bistro's internal traffic to find cleartext customer credentials.
      Download: http://challenges:8081/network/cleartext_traffic.pcap
    value: 200
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{cl34rt3xt_cr3ds_f0und_HASH}"
        type: dynamic_xor
    files:
      - location: /challenges/network/cleartext_traffic.pcap

  - name: "Chef's Secret Recipe"
    category: Cryptography
    description: |
      The Chef encoded his secret recipe multiple times.
      Encoded string: VTBGTVIxdGlZWE5sTmpSZlpHVmpiMlJsWkY5emRXTmpaWE56TG5SMGVIUT0=
    value: 200
    type: decay
    state: visible
    max_attempts: 0
