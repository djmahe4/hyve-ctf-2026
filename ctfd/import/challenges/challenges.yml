  - name: "Menu Search Vulnerability"
    category: Web
    description: |
      The ingredients search bar is reflecting input. 
      Target: http://challenges:8080/menu-search?q=YOUR_INPUT

      Execute script to reveal the secret search token.
    value: 300
    type: decay
    state: visible
    max_attempts: 0
    flags:
      - flag: "HYVE_CTF{xss_r3fl3ct3d_vuln_HASH}"
        type: dynamic_xor

  - name: "Order Tracking Exploit"
    category: Web
    description: |
      Access other customers' orders via the tracking API.
      Target: http://challenges:8080/api/order/tracking/1

