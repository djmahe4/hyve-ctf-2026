{% extends "admin/challenges/create.html" %}

{% block header %}
<div class="alert alert-secondary" role="alert">
    Decay Challenges start with an initial value and decrease in points over time.
</div>
{% endblock %}

{% block value %}
<div class="form-group">
    <label for="value">Initial Value<br>
        <small class="form-text text-muted">The starting point value of the challenge</small>
    </label>
    <input type="number" class="form-control" name="value" placeholder="Enter value" required>
</div>

<div class="form-group">
    <label for="value">Decay Limit<br>
        <small class="form-text text-muted">The minimum points this challenge can decrease to</small>
    </label>
    <input type="number" class="form-control" name="minimum" placeholder="Enter minimum value" required>
</div>

<div class="form-group">
    <label for="value">Decay Rate<br>
        <small class="form-text text-muted">Points deducted per decay period</small>
    </label>
    <input type="number" class="form-control" name="decay" placeholder="Enter decay rate" required>
</div>
{% endblock %}

{% block type %}
<input type="hidden" value="decay" name="type" id="challenge-type">
{% endblock %}
